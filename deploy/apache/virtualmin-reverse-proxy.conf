# Apache + Virtualmin template (reverse proxy mode)
# Frontend vhost (HTTPS) proxies to internal PHP backend at 127.0.0.1:8080

# Required modules (enable once):
# a2enmod headers rewrite ssl proxy proxy_http remoteip

SSLProxyEngine On
ProxyPreserveHost On
RequestHeader set X-Forwarded-Proto "https"
RequestHeader set X-Forwarded-Port "443"
ProxyTimeout 120

# Do not expose setup endpoint in production.
<LocationMatch "^/setup\.php$">
    Require all denied
</LocationMatch>

# Security headers at edge.
<IfModule mod_headers.c>
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()"
    Header always set X-XSS-Protection "0"
    Header always setifempty Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'; object-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'"
</IfModule>

ProxyPass        / http://127.0.0.1:8080/
ProxyPassReverse / http://127.0.0.1:8080/
