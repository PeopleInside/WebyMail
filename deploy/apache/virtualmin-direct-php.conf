# Apache + Virtualmin template (direct PHP deployment)
# Use this inside the VirtualHost directives for the domain.

# Required modules (enable once):
# a2enmod headers rewrite ssl proxy proxy_http remoteip

# If behind Cloudflare or another reverse proxy, configure remote IP parsing.
# RemoteIPHeader X-Forwarded-For
# RemoteIPInternalProxy 127.0.0.1

<IfModule mod_headers.c>
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()"
    Header always set X-XSS-Protection "0"
    Header always setifempty Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'; object-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'"
</IfModule>

# Keep setup endpoint blocked after first install.
<LocationMatch "^/setup\.php$">
    Require all denied
</LocationMatch>

# Deny sensitive internal paths from web access.
<LocationMatch "^/(data|config|src|templates)/">
    Require all denied
</LocationMatch>

# Extra hardening for this app root.
<Directory /home/USER/public_html>
    Options -Indexes
    AllowOverride All
    Require all granted
</Directory>

# Recommended at PHP-FPM pool level in Virtualmin:
# php_admin_flag[expose_php] = Off
# php_admin_value[session.cookie_httponly] = 1
# php_admin_value[session.cookie_samesite] = Strict
# php_admin_value[session.cookie_secure] = 1
